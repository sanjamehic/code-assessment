<!doctype html>
<html>
  <head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="styles/styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script type="text/javascript" src="scripts/scripts.js"></script>
  </head>
  <body class="app">
    <header class="header">
      <div class="container mobile-header d-md-none">
        <div class="mobile-menu-icon">
          <i class="fa-solid fa-bars"></i>
        </div>
        <div class="mobile-logo">
          <img src="assets/rioseo-logo-mobile.png" alt="rioseo logo" />
        </div>

        <div class="mobile-location-icon">
          <span class="location-pin"></span>
        </div>
      </div>

      <div
        class="container d-none d-md-flex justify-content-between align-items-center py-3"
      >
        <div class="logo">
          <img src="assets/rioseo-logo.png" alt="rioseo logo" />
        </div>
        <nav class="navlinks">
          <a href="#">Menu</a>
          <a href="#">
            <img src="assets/location-icon.png" />
            Truck Locator
          </a>
        </nav>
      </div>
    </header>

    <div class="container mt-4">
      <h4 id="trucks-count"></h4>
      <div class="row content-container">
        <div class="col-md-6 locations" id="locations-list">
          <div class="d-flex justify-content-center align-items-center h-100" id="loading-state">
            <div class="spinner-border text-secondary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
        <div class="col-md-6 map">
          <div class="map-wrapper">
            <div id="info-modal" class="modal-overlay">
              <div class="modal-content">
                <div class="modal-header">
                  <button id="close-modal" class="close-btn" aria-label="Close modal">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>

                <div id="modal-body"></div>
              </div>
            </div>
            <div id="map-placeholder" class="map-placeholder">
              Click a location card to load a map
            </div>
            <img id="map-image" alt="map image" />
          </div>
        </div>
      </div>
      <div class="mobile-toggle d-md-none">
        <button id="show-list" class="toggle-btn active-toggle">List</button>
        <button id="show-map" class="toggle-btn">Map</button>
      </div>
    </div>
  </body>
</html>
